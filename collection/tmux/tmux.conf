set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind j select-pane -L
bind l select-pane -R
bind k select-pane -U
bind i select-pane -D

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Enable mouse mode
set -g mouse on

# clipboard
set-option -g set-clipboard on

# split panes using | and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf

# don't rename windows automatically
set-option -g allow-rename off

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$TMUX_PLUGIN_MANAGER_PATH"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Themes ---------------------------------------------
# https://github.com/maxpetretta/tmux-monokai-pro
set -g @plugin 'maxpetretta/tmux-monokai-pro'

# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, attached-clients, network-vpn, weather, time, spotify-tui, kubernetes-context, synchronize-panes
set -g @monokai-plugins "cpu-usage ram-usage battery"
set -g @monokai-narrow-plugins "compact-alt battery network weather"
set -g @monokai-battery-label "BAT"
set -g @monokai-battery-label "󰂈"
set -g @monokai-cpu-usage-label "CPU"
set -g @monokai-cpu-usage-label ""
set -g @monokai-ram-usage-label "RAM"
set -g @monokai-ram-usage-label ""

# available colors: white, gray, dark_gray, light_purple, dark_purple, cyan, green, orange, red, pink, yellow
# set -g @monokai-[plugin-name]-colors "[background] [foreground]"
set -g @monokai-battery-colors "gray white"

# Enable powerline symbols
set -g @monokai-show-powerline true
set -g @monokai-show-edge-icons true

set -g @monokai-show-left-sep 
set -g @monokai-show-right-sep 
set -g @monokai-transparent-powerline-bg true
# set -g @monokai-inverse-divider 


# Enable window flags
set -g @monokai-show-flags false

# Switch the left smiley icon
# it can accept `session`, `smiley`, `window`, or any character.
set -g @monokai-show-left-icon 'session'
# set -g @monokai-show-left-icon 🐼
# set -g @monokai-left-pad false

# Enable high contrast pane border
set -g @monokai-border-contrast false

# Hide empty plugins
set -g @monokai-show-empty-plugins false

# Ping
set -g @monokai-ping-server "google.com"
set -g @monokai-ping-rate 5

# Git
set -g @monokai-git-disable-status true
# Set symbol to use for when branch is up to date with HEAD
# default is ✓. Avoid using non unicode characters that bash uses like $, * and !
set -g @monokai-git-show-current-symbol ✓
# Set symbol to use for when branch diverges from HEAD
# default is unicode !. Avoid bash special characters
set -g @monokai-git-show-diff-symbol !

set -g @monokai-synchronize-panes-label "Sync"


