# TERMINAL
set-option -sa terminal-overrides ",xterm*:Tc"

# LEADER KEY
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# CLEAR
bind    C-k send-keys C-l \; clear-history

# WINDOWS
# Leader > Ctrl+Arrows to create new window
bind    C-Left  new-window -b
bind    C-Right new-window -a
bind    C-Up    new-window
bind    C-Down  new-window -t :=0
## Ctrl+Arrow to switch windows
bind -n C-Left  previous-window
bind -n C-Right next-window
## Window naming
set-option -g allow-rename off

# PANES
## Leader > Ctrl+Shift+Arrow to split panes
bind    C-S-Right split-window -h    -c "#{pane_current_path}"
bind    C-S-Left  split-window -h -b -c "#{pane_current_path}"
bind    C-S-Up    split-window -v -b -c "#{pane_current_path}"
bind    C-S-Down  split-window -v    -c "#{pane_current_path}"
## Ctrl+Shift+Arrow to select panes
bind -n C-S-Left  select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up    select-pane -U
bind -n C-S-Down  select-pane -D
## Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# CONFIG
## Reload config
bind S-r source-file ~/.config/tmux/tmux.conf

# PLUGINS
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$TMUX_PLUGIN_MANAGER_PATH"

## List of plugins
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'

## Themes
### https://github.com/maxpetretta/tmux-monokai-pro
set -g @plugin 'maxpetretta/tmux-monokai-pro'

## Available plugins:
# - battery
# - cpu-usage
# - git
# - gpu-usage
# - ram-usage
# - tmux-ram-usage
# - network
# - network-bandwidth
# - network-ping
# - attached-clients
# - network-vpn
# - weather
# - time
# - kubernetes-context
# - synchronize-panes

# set -g @monokai-plugins "cpu-usage ram-usage battery"
set -g @monokai-plugins "battery"
set -g @monokai-battery-label "BAT"
set -g @monokai-battery-label "󰂈"
set -g @monokai-cpu-usage-label "CPU"
set -g @monokai-cpu-usage-label ""
set -g @monokai-ram-usage-label "RAM"
set -g @monokai-ram-usage-label ""

# Available colors:
# - white
# - gray
# - dark_gray
# - light_purple
# - dark_purple
# - cyan
# - green
# - orange
# - red
# - pink
# - yellow
# set -g @monokai-[plugin-name]-colors "[background] [foreground]"

## Colors
set -g @monokai-battery-colors "gray white"

## Enable powerline symbols
set -g @monokai-show-powerline true
set -g @monokai-show-edge-icons true

set -g @monokai-show-left-sep 
set -g @monokai-show-right-sep 
set -g @monokai-transparent-powerline-bg true
# set -g @monokai-inverse-divider 


## Enable window flags
set -g @monokai-show-flags false

## Switch the left smiley icon
## it can accept `session`, `smiley`, `window`, or any character.
set -g @monokai-show-left-icon 'session'
# set -g @monokai-show-left-icon 🐼
# set -g @monokai-left-pad false

## Enable high contrast pane border
set -g @monokai-border-contrast false

## Hide empty plugins
set -g @monokai-show-empty-plugins false

## Ping
set -g @monokai-ping-server "google.com"
set -g @monokai-ping-rate 5

## Git
set -g @monokai-git-disable-status true
## Set symbol to use for when branch is up to date with HEAD
## default is ✓. Avoid using non unicode characters that bash uses like $, * and !
set -g @monokai-git-show-current-symbol ✓
## Set symbol to use for when branch diverges from HEAD
## default is unicode !. Avoid bash special characters
set -g @monokai-git-show-diff-symbol !
set -g @monokai-synchronize-panes-label "Sync"

# run '/opt/homebrew/opt/tpm/share/tpm/tpm'
run-shell "/opt/homebrew/opt/tpm/share/tpm/tpm"

# MOUSE
set -g mouse on
# unbind -n MouseDrag1Pane

# Disable right-click context menu
unbind-key -T root MouseDown3Pane
unbind-key -T copy-mode MouseDown3Pane
unbind-key -T copy-mode-vi MouseDown3Pane

# CLIPBOARD
set -as terminal-features ',*:clipboard'
set -g set-clipboard on
set -g allow-passthrough on

# set -as terminal-overrides ',*:Ms=\E]52;c;%p2%s\a'

# Mouse copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Native tmux copy mode → OSC52
setw -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode y send-keys -X copy-selection-and-cancel
